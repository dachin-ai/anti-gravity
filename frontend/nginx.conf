server {
    listen 8080;
    server_name localhost;

    # Main app - serve static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API proxy - forward to backend (for Cloud Run same-domain setup)
    location /api/ {
        # In Cloud Run, both frontend and backend are separate services
        # Frontend calls http://localhost:8000/api (won't work in production)
        # This proxy allows frontend to call /api which gets forwarded to backend
        
        # Get backend URL from environment variable or use Cloud Run service discovery
        # For now, use backend service name (requires Cloud Run setup)
        proxy_pass http://anti-gravity:8000;
        
        # Pass through headers and auth tokens
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Handle websockets if needed
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
