steps:
  # ── BACKEND ──────────────────────────────────────────────
  # 1. Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - build
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/anti-gravity:$COMMIT_SHA'
      - './backend'

  # 2. Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - push
      - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/anti-gravity:$COMMIT_SHA'

  # 3. Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - anti-gravity
      - '--image=asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/anti-gravity:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--allow-unauthenticated'
      - '--set-env-vars=DATABASE_URL=${_DATABASE_URL},JWT_SECRET=${_JWT_SECRET}'
      - '--set-secrets=/etc/secrets/credentials.json=credentials-json:latest'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--quiet'

  # ── FRONTEND ─────────────────────────────────────────────
  # 4. Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - build
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/frontend-anti-gravity:$COMMIT_SHA'
      - './frontend'

  # 5. Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - push
      - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/frontend-anti-gravity:$COMMIT_SHA'

  # 6. Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - frontend-anti-gravity
      - '--image=asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/frontend-anti-gravity:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--allow-unauthenticated'
      - '--quiet'

images:
  - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/anti-gravity:$COMMIT_SHA'
  - 'asia-southeast1-docker.pkg.dev/dachin-ai-493209/cloud-run-source-deploy/frontend-anti-gravity:$COMMIT_SHA'

timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _JWT_SECRET: 'freemir_antigravity_2026_prod_secret'
  _DATABASE_URL: 'postgresql://neondb_owner:npg_e1Jl3rWoTcAR@ep-withered-butterfly-ao66aczs-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require'
