# Runs the same pipeline as Google Cloud Build (cloudbuild.yaml) on every push to main.
# Requires one-time setup: GitHub repo secret GCP_SA_JSON (service account key JSON) with
# roles: Cloud Build Editor, Cloud Run Admin, Service Account User, and Artifact Registry Writer
# (or Storage Admin) as needed for your project dachin-ai-493209.
name: Deploy (Cloud Build → Cloud Run)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloud-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: dachin-ai-493209

      - name: Submit Cloud Build
        run: gcloud builds submit . --config=cloudbuild.yaml --project=dachin-ai-493209 --verbosity=info
